version: '3.8'

services:
    app:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: laravel_app
        volumes:
            - .:/var/www/html
            - ./storage:/var/www/html/storage
        environment:
            # In Docker, use the Python container's service name — NOT localhost.
            # localhost inside this container refers to the PHP container itself.
            # FACE_SERVICE_URL: http://face-service:5050
            # Temp dir for face images shared with the Python service via the storage volume.
            FACE_TEMP_DIR: /var/www/html/storage/app/temp
            NO_PROXY: localhost,127.0.0.1,face-service,laravel_app,nginx,mysql
            no_proxy: localhost,127.0.0.1,face-service,laravel_app,nginx,mysql
        depends_on:
            - mysql
            - python
        networks:
            - hris

    nginx:
        build:
            context: .
            dockerfile: docker/nginx/Dockerfile
        container_name: nginx
        ports:
            - "8085:80"
        volumes:
            - .:/var/www/html
            - ./storage:/var/www/html/storage
        depends_on:
            - app
        networks:
            - hris

    python:
        build:
            context: .
            dockerfile: docker/python/Dockerfile
        container_name: face-service
        volumes:
            - .:/var/www/html
            - ./storage:/var/www/html/storage
            # Mount live source over the image's copied version so code changes
            # are picked up immediately without rebuilding the Docker image.
            - ./face_recognition_service:/app/face_recognition_service
        ports:
            - "5050:5000"
        depends_on:
            - mysql
        env_file:
            - face_recognition_service/.env
        environment:
            # Must match FACE_TEMP_DIR in the app container so both share the same files.
            ALLOWED_IMAGE_TMP_DIR: /var/www/html/storage/app/temp
        networks:
            - hris

    mysql:
        image: mysql:8.0
        container_name: mysql
        restart: always
        environment:
            MYSQL_DATABASE: hris_db
            MYSQL_ROOT_PASSWORD: root
        ports:
            - "3307:3306"
        volumes:
            - dbdata:/var/lib/mysql
        networks:
            - hris

networks:
    hris:

volumes:
    dbdata:
